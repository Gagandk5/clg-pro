<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        img {
            display: block;
            margin: 80px auto;
        }

        fieldset {
            width: 300px;
            margin: auto;
            color: green;
            border: 0;
        }

        a {

            color: green;
        }

        input {
            width: 90%;
            height: 30px;
            margin-top: 5px;
            margin-left: 10px;
            margin-bottom: 20px;
            border-style: solid;
            border-color: green;
            border-width: 0;
            border-bottom-width: 3px;
        }

        input:focus {
            outline: none;
        }

        label {
            margin-left: 10px;
        }

        a {
            margin-left: 80px;
        }

        button {
            width: 90%;
            margin-left: 15px;
            margin-top: 20px;
            height: 30px;
            background-color: green;
            color: #fff;
            border: 0;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <img src="images/logo.jpeg" alt="logo">
    <form action="dashbord.html" method="get">
        <fieldset>
            <label for="username">User Name</label>
            <br>
            <input type="text" name="username" required>
            <br>
            <label for="password">password</label>
            <br>
            <input type="password" name="password" required>
            <br>
            <a href="">Forgot Password ?</a>
            <br>
            <button type="submit">LOG IN</button>
        </fieldset>
    </form>
</body>

</html>
